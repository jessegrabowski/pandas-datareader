name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    name: Pre-Commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  tests:
    name: Tests (${{ matrix.os }}, ${{ matrix.environment }})
    needs: pre-commit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        environment: [default, py313, py314]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for hatch-vcs

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.70.2
          environments: ${{ matrix.environment }}
          cache: true

      - name: List installed packages
        run: pixi list -e ${{ matrix.environment }}

      - name: Run tests
        run: pixi run -e ${{ matrix.environment }} test-cov

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: ${{ matrix.os }}-${{ matrix.environment }}
          fail_ci_if_error: false
